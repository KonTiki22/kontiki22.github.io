<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Галерея Фигурок | AR mode</title>

    <link rel="stylesheet" href="styles.css">
    <script src="js/aframe.min.js"></script>
    <script src="background-gradient.js"></script>
    
    <!-- ДЕБАГ-КОНСОЛЬ ДЛЯ СМАРТФОНА (Раскомментируй строку ниже, если нужно видеть ошибки прямо на телефоне) -->
    <!-- <script src="https://cdn.jsdelivr.net/npm/eruda"></script><script>eruda.init();</script> -->

    <style>
        #ar-instructions {
            display: none;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 85%; max-width: 340px;
            background: rgba(0, 0, 0, 0.9);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 24px;
            padding: 25px;
            color: white;
            text-align: center;
            z-index: 300;
        }
        #ar-instructions h3 { margin-top: 0; color: #4CC3D9; }
        #ar-instructions p { font-size: 14px; line-height: 1.6; text-align: left; margin: 15px 0; }
        .gesture-hint {
            background: rgba(255,255,255,0.1);
            padding: 12px; border-radius: 12px;
            font-size: 13px !important; margin-bottom: 20px !important;
        }
        .instruction-btn {
            background: #4CC3D9; color: white; border: none;
            padding: 12px; border-radius: 12px; font-weight: bold;
            width: 100%; cursor: pointer; text-transform: uppercase;
        }
        #ar-ui { display: none; position: absolute; bottom: 25px; left: 0; right: 0; pointer-events: none; z-index: 200; }
        body.ar-mode #ar-ui { display: block; }
        .ar-action-btn {
            position: absolute; bottom: 0; border: 1px solid rgba(255,255,255,0.4);
            border-radius: 50%; width: 60px; height: 60px; font-size: 26px;
            display: flex; align-items: center; justify-content: center;
            pointer-events: auto; color: white; transition: transform 0.1s;
        }
        .ar-action-btn:active { transform: scale(0.9); }
        #ar-reset-btn { left: 25px; background: linear-gradient(135deg, #0078ff, #004ecc); }
        #ar-exit-btn { right: 25px; background: linear-gradient(135deg, #ff3b3b, #cc0000); }
    </style>
</head>
<body>

    <div id="overlay">
        <div class="header-title">3D галерея «Коренные народы Сибири»</div>
        <div id="loading">
            <div class="spinner"></div>
            <div>Загрузка...</div>
        </div>
        <div id="arrows">
            <button class="arrow-btn" id="prev-btn">←</button>
            <button class="arrow-btn" id="next-btn">→</button>
        </div>
        <div id="description"></div>

        <button id="ar-mode-btn" class="custom-ar-button" style="display: none;">AR</button>
        <div id="ar-unsupported-msg" class="ar-unsupported-msg">⚠️ AR не поддерживается</div>

        <div id="ar-instructions">
            <h3>Инструкция AR</h3>
            <p>1. Медленно сканируйте пол камерой.<br>
               2. Наведите <b>голубой кружок</b> в нужное место и <b>тапните по нему</b>.</p>
            <p class="gesture-hint">
                <b>Жесты:</b><br>
                👆 Перемещение: 1 палец<br>
                ✌️ Вращение и масштаб: 2 пальца
            </p>
            <button class="instruction-btn" id="close-instr-btn">ПОНЯТНО</button>
        </div>

        <div id="ar-ui">
            <button id="ar-reset-btn" class="ar-action-btn">🔄</button>
            <button id="ar-exit-btn" class="ar-action-btn">✖</button>
        </div>
    </div>

    <a-scene
        renderer="colorManagement: true; antialias: true; physicallyCorrectLights: true; logarithmicDepthBuffer: true;"
        shadow="type: pcfsoft"
        webxr="requiredFeatures: hit-test; optionalFeatures: dom-overlay; overlayElement: #overlay; referenceSpaceType: local;"
        ar-placement
        ar-model-sync
        gallery-controls>

        <a-sky material="shader: background-gradient; colorTop: #1e2a3a; colorBottom: #0a0a0a;" geometry="primitive: sphere; radius: 500;" hide-on-enter-ar></a-sky>

        <a-entity light="type: ambient; intensity: 0.9;"></a-entity>
        <a-entity id="main-light" position="3 5 4" light="type: directional; intensity: 1.6; castShadow: true; shadowBias: -0.0005; shadowMapHeight: 2048; shadowMapWidth: 2048;"></a-entity>

        <a-entity id="model-wrapper" position="0 0 0" hide-on-enter-ar>
            <a-entity id="main-model" gltf-model="models/Figure_1.glb" shadow="cast: true; receive: true"></a-entity>
        </a-entity>
        <a-plane rotation="-90 0 0" position="0 0 0" width="20" height="20" color="#111" opacity="0.3" shadow="receive: true" hide-on-enter-ar></a-plane>

        <a-entity id="reticle" visible="false">
            <a-ring rotation="-90 0 0" radius-inner="0.04" radius-outer="0.06" color="#4CC3D9" material="shader: flat; opacity: 0.8"></a-ring>
        </a-entity>

        <a-entity id="ar-model" visible="false">
            <a-entity id="ar-model-inner" shadow="cast: true; receive: true"></a-entity>
        </a-entity>

        <a-entity id="main-camera" camera look-controls="enabled: false" wasd-controls="enabled: false" position="0 0 0.25"></a-entity>
    </a-scene>

    <script>
        const instrWindow = document.getElementById('ar-instructions');
        
        document.getElementById('close-instr-btn').addEventListener('click', () => {
            instrWindow.style.display = 'none';
            sessionStorage.setItem('ar_hint_shown', 'true');
        });

        document.getElementById('ar-exit-btn').addEventListener('click', () => {
            const sceneEl = document.querySelector('a-scene');
            if (sceneEl.renderer.xr.getSession()) sceneEl.renderer.xr.getSession().end();
        });

        document.getElementById('ar-reset-btn').addEventListener('click', () => {
            document.querySelector('a-scene').emit('ar-request-reset');
        });

        const arButton = document.getElementById('ar-mode-btn');
        async function checkARSupport() {
            if ('xr' in navigator && 'isSessionSupported' in navigator.xr) {
                const supported = await navigator.xr.isSessionSupported('immersive-ar');
                arButton.style.display = supported ? 'flex' : 'none';
                document.getElementById('ar-unsupported-msg').style.display = supported ? 'none' : 'block';
            }
        }
        checkARSupport();

        arButton.addEventListener('click', () => {
            const sceneEl = document.querySelector('a-scene');
            if (sceneEl) sceneEl.enterVR({ mode: 'immersive-ar' });
        });
        
        // --- 1. AR УПРАВЛЕНИЕ ---
        AFRAME.registerComponent('ar-placement', {
            init: function () {
                this.reticle = document.getElementById('reticle');
                this.arModel = document.getElementById('ar-model');
                this.arMode = false; this.placed = false; this.hitTestSource = null;
                const sceneEl = this.el;

                this.resetPlacement = () => {
                    this.placed = false;
                    if (this.arModel) this.arModel.setAttribute('visible', false);
                    console.log("AR State Reset");
                };

                sceneEl.addEventListener('ar-request-reset', this.resetPlacement);
                sceneEl.addEventListener('figure-changed', this.resetPlacement);

                sceneEl.addEventListener('enter-vr', () => {
                    if (sceneEl.is('ar-mode')) {
                        this.arMode = true; this.placed = false;
                        document.body.classList.add('ar-mode');
                        if (!sessionStorage.getItem('ar_hint_shown')) instrWindow.style.display = 'block';
                        
                        const session = sceneEl.renderer.xr.getSession();
                        if (session) {
                            session.addEventListener('select', () => this.onSelect());
                            session.requestReferenceSpace('viewer').then((vs) => { 
                                this.viewerSpace = vs; 
                                session.requestHitTestSource({ space: vs }).then((s) => { this.hitTestSource = s; });
                            });
                            session.requestReferenceSpace('local').then((s) => { this.localSpace = s; });
                        }
                    }
                });

                sceneEl.addEventListener('exit-vr', () => {
                    this.arMode = false; this.placed = false;
                    document.body.classList.remove('ar-mode');
                    if (this.arModel) this.arModel.setAttribute('visible', false);
                    if (this.hitTestSource) { this.hitTestSource.cancel(); this.hitTestSource = null; }
                });

                this.onPointerDown = this.onPointerDown.bind(this);
                this.onPointerUp = this.onPointerUp.bind(this);
                this.onPointerMove = this.onPointerMove.bind(this);
                window.addEventListener('touchstart', this.onPointerDown, { passive: false });
                window.addEventListener('touchend', this.onPointerUp);
                window.addEventListener('touchmove', this.onPointerMove, { passive: false });
            },

            tick: function () {
                if (!this.arMode || !this.hitTestSource || this.placed || !this.localSpace) return;
                const frame = this.el.sceneEl.frame;
                if (!frame) return;
                const results = frame.getHitTestResults(this.hitTestSource);
                if (results.length > 0) {
                    const pose = results[0].getPose(this.localSpace);
                    this.reticle.setAttribute('visible', true);
                    this.reticle.setAttribute('position', pose.transform.position);
                    this.reticle.object3D.quaternion.copy(pose.transform.orientation);
                } else { this.reticle.setAttribute('visible', false); }
            },

            onSelect: function () {
                if (instrWindow.style.display === 'block') return;
                if (!this.arMode || this.placed || !this.reticle.getAttribute('visible')) return;
                
                this.arModel.setAttribute('position', this.reticle.getAttribute('position'));
                this.arModel.object3D.quaternion.copy(this.reticle.object3D.quaternion);
                
                // Форсируем показ
                this.arModel.setAttribute('visible', true);
                this.placed = true; 
                this.reticle.setAttribute('visible', false);
                
                // Оповещаем синхронизатор, что модель поставлена и её надо показать
                this.el.emit('ar-model-placed');
                
                if (window.navigator.vibrate) window.navigator.vibrate(50);
            },

            onPointerDown: function (evt) {
                if (!this.arMode || !this.placed) return;
                if (evt.touches.length === 2) {
                    this.initialDistance = Math.hypot(evt.touches[0].clientX - evt.touches[1].clientX, evt.touches[0].clientY - evt.touches[1].clientY);
                    this.initialScale = this.arModel.object3D.scale.x;
                    this.initialAngle = Math.atan2(evt.touches[0].clientY - evt.touches[1].clientY, evt.touches[0].clientX - evt.touches[1].clientX);
                    this.initialRotationY = this.arModel.getAttribute('rotation').y;
                } else if (evt.touches.length === 1) {
                    this.isDragging = true;
                    this.prevPos = { x: evt.touches[0].clientX, y: evt.touches[0].clientY };
                }
            },

            onPointerMove: function (evt) {
                if (!this.arMode || !this.placed) return;
                if (evt.touches.length === 2) {
                    evt.preventDefault();
                    const dist = Math.hypot(evt.touches[0].clientX - evt.touches[1].clientX, evt.touches[0].clientY - evt.touches[1].clientY);
                    const angle = Math.atan2(evt.touches[0].clientY - evt.touches[1].clientY, evt.touches[0].clientX - evt.touches[1].clientX);
                    this.arModel.object3D.scale.setScalar(Math.max(0.1, Math.min(5.0, this.initialScale * (dist / this.initialDistance))));
                    let deltaAngle = angle - this.initialAngle;
                    this.arModel.setAttribute('rotation', { x: 0, y: this.initialRotationY - deltaAngle * (180 / Math.PI), z: 0 });
                } else if (this.isDragging && evt.touches.length === 1) {
                    evt.preventDefault();
                    const dx = evt.touches[0].clientX - this.prevPos.x;
                    const dy = evt.touches[0].clientY - this.prevPos.y;
                    let pos = this.arModel.getAttribute('position');
                    pos.x += dx * 0.0015; pos.z += dy * 0.0015;
                    this.arModel.setAttribute('position', pos);
                    this.prevPos = { x: evt.touches[0].clientX, y: evt.touches[0].clientY };
                }
            },
            onPointerUp: function () { this.isDragging = false; }
        });

        // --- 2. ГАЛЕРЕЯ УПРАВЛЕНИЕ ---
        AFRAME.registerComponent('gallery-controls', {
            init: function () {
                this.wrapper = document.getElementById('model-wrapper');
                this.camera = document.getElementById('main-camera');
                this.isDragging = false; this.zoom = 0.175;
                this.onPointerDown = this.onPointerDown.bind(this);
                this.onPointerUp = this.onPointerUp.bind(this);
                this.onPointerMove = this.onPointerMove.bind(this);
                this.onWheel = this.onWheel.bind(this);
                document.addEventListener('mousedown', this.onPointerDown);
                document.addEventListener('mouseup', this.onPointerUp);
                document.addEventListener('mousemove', this.onPointerMove);
                document.addEventListener('touchstart', this.onPointerDown, { passive: false });
                document.addEventListener('touchend', this.onPointerUp);
                document.addEventListener('touchmove', this.onPointerMove, { passive: false });
                document.addEventListener('wheel', this.onWheel, { passive: false });
            },
            onPointerDown: function (evt) {
                if (document.body.classList.contains('ar-mode') || evt.target.closest('button')) return;
                this.isDragging = true;
                if (evt.touches && evt.touches.length === 2) {
                    this.initDist = Math.hypot(evt.touches[0].clientX - evt.touches[1].clientX, evt.touches[0].clientY - evt.touches[1].clientY);
                    this.initZoom = this.zoom;
                } else {
                    this.prevPos = { x: evt.touches ? evt.touches[0].clientX : evt.clientX, y: evt.touches ? evt.touches[0].clientY : evt.clientY };
                }
            },
            onPointerMove: function (evt) {
                if (document.body.classList.contains('ar-mode') || !this.isDragging) return;
                if (evt.touches && evt.touches.length === 2) {
                    evt.preventDefault();
                    let d = Math.hypot(evt.touches[0].clientX - evt.touches[1].clientX, evt.touches[0].clientY - evt.touches[1].clientY);
                    this.zoom = Math.max(0.1, Math.min(0.25, this.initZoom * (this.initDist / d)));
                } else {
                    evt.preventDefault();
                    let cx = evt.touches ? evt.touches[0].clientX : evt.clientX;
                    let cy = evt.touches ? evt.touches[0].clientY : evt.clientY;
                    let rot = this.wrapper.getAttribute('rotation');
                    let nx = Math.max(-70, Math.min(70, rot.x + (cy - this.prevPos.y) * 0.22));
                    this.wrapper.setAttribute('rotation', { x: nx, y: rot.y + (cx - this.prevPos.x) * 0.22, z: 0 });
                    this.prevPos = { x: cx, y: cy };
                }
                this.camera.setAttribute('position', `0 0 ${this.zoom}`);
            },
            onPointerUp: function () { this.isDragging = false; },
            onWheel: function (evt) {
                if (document.body.classList.contains('ar-mode')) return;
                this.zoom = Math.max(0.1, Math.min(0.25, this.zoom + evt.deltaY * 0.001));
                this.camera.setAttribute('position', `0 0 ${this.zoom}`);
            }
        });

        // --- 3. СИНХРОНИЗАЦИЯ МОДЕЛЕЙ (ФИКС ИСЧЕЗНОВЕНИЯ) ---
        AFRAME.registerComponent('ar-model-sync', {
            init: function () {
                this.inner = document.getElementById('ar-model-inner');
                this.el.addEventListener('figure-changed', (e) => { this.curr = e.detail.figure; this.update(); });
                this.el.addEventListener('ar-model-placed', () => {
                    // Принудительно показываем при установке
                    this.inner.setAttribute('visible', true);
                    this.scale();
                });
                this.update();
            },
            update: function () {
                if (!this.inner) return;
                this.inner.removeAttribute('gltf-model');
                setTimeout(() => {
                    this.inner.setAttribute('gltf-model', `models/Figure_${this.curr || 1}.glb`);
                    this.inner.addEventListener('model-loaded', () => this.scale(), { once: true });
                }, 50);
            },
            scale: function () {
                const obj = this.inner.object3D;
                if (!obj) return;
                
                // Ждем пока появятся дети (меш)
                if (obj.children.length === 0) {
                    setTimeout(() => this.scale(), 100);
                    return;
                }

                obj.rotation.set(0,0,0); obj.scale.setScalar(1); obj.position.set(0,0,0);
                obj.updateMatrixWorld(true);

                const box = new THREE.Box3().setFromObject(obj);
                const size = new THREE.Vector3(); box.getSize(size);
                const maxDim = Math.max(size.x, size.y, size.z);
                
                if (maxDim === 0 || isNaN(maxDim)) {
                    setTimeout(() => this.scale(), 100);
                    return;
                }

                obj.scale.setScalar(0.20 / maxDim);
                obj.updateMatrixWorld(true);

                const b2 = new THREE.Box3().setFromObject(obj);
                const center = new THREE.Vector3(); b2.getCenter(center);
                obj.position.set(-center.x, -b2.min.y, -center.z);
                console.log("AR Model Rescaled Correctly");
            }
        });

        // --- 4. ДАННЫЕ И ЛОГИКА ГАЛЕРЕИ ---
        const figureNames = {
            1: "«Ненецкая девушка»", 2: "«Эвенкийка, вышивающая шапку»", 3: "«Женщина с собакой»", 
            4: "«Эвенкийская семья»", 5: "«Эвенкийский мужчина»", 6: "«Русская пара в летних нарядах»", 
            7: "«Бурятский мужчина»", 8: "«Бурятская женщина»", 9: "«Тофаларский охотник»", 
            10: "«Тофаларская охотница»", 11: "«Бурятский мужчина»", 
            12: "«Тофаларская женщина с младенцем в берестяной колыбели»", 
            13: "«Бурятский мужчина»", 14: "«Эвенкийская женщина»", 
            15: "«Эвенкийская женщина, вышивающая рукавицы»", 16: "«Бурятский мужчина»"
        };

        const model = document.getElementById('main-model');
        const wrapper = document.getElementById('model-wrapper');
        const loading = document.getElementById('loading');
        let currentFigure = 1;

        function process() {
            const mesh = model.getObject3D('mesh');
            if (!mesh) return setTimeout(process, 50);
            wrapper.object3D.rotation.set(0,0,0);
            model.object3D.rotation.set(0,0,0); model.object3D.scale.setScalar(1); model.object3D.position.set(0,0,0);
            model.object3D.updateMatrixWorld(true);
            const box = new THREE.Box3().setFromObject(model.object3D);
            const size = new THREE.Vector3(); box.getSize(size);
            model.object3D.scale.setScalar(0.15 / Math.max(size.x, size.y, size.z));
            model.object3D.updateMatrixWorld(true);
            const b2 = new THREE.Box3().setFromObject(model.object3D);
            const c = new THREE.Vector3(); b2.getCenter(c);
            model.object3D.position.set(-c.x, -c.y, -c.z);
            document.querySelector('a-plane').setAttribute('position', `0 ${new THREE.Box3().setFromObject(model.object3D).min.y - 0.05} 0`);
            loading.style.display = 'none';
        }

        model.addEventListener('model-loaded', process);

        function load(num) {
            loading.style.display = 'flex';
            document.getElementById('description').textContent = figureNames[num];
            model.removeAttribute('gltf-model');
            setTimeout(() => {
                model.setAttribute('gltf-model', `models/Figure_${num}.glb`);
                document.querySelector('a-scene').dispatchEvent(new CustomEvent('figure-changed', { detail: { figure: num } }));
            }, 20);
        }

        document.getElementById('prev-btn').onclick = () => { currentFigure = (currentFigure > 1) ? currentFigure - 1 : 16; load(currentFigure); };
        document.getElementById('next-btn').onclick = () => { currentFigure = (currentFigure < 16) ? currentFigure + 1 : 1; load(currentFigure); };
        load(1);

        document.getElementById('overlay').addEventListener('beforexrselect', (e) => { 
            if (e.target.closest('button') || e.target.closest('#ar-instructions')) e.preventDefault(); 
        });
    </script>
</body>
</html>

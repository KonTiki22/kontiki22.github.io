<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Галерея Фигурок</title>

    
    
    <script src="js/aframe.min.js"></script>
    <script src="background-gradient.js"></script>

    <style>
        body { margin: 0; overflow: hidden; font-family: sans-serif; background-color: #111; touch-action: none; }
        
        /* Скрываем стандартную кнопку VR */
        .a-enter-vr-button, .a-enter-vr-modal {
            display: none !important;
        }
        
        .ar-button {
            position: absolute;
            top: 15px;
            right: 15px;
            padding: 10px 20px;
            background: rgba(76, 195, 217, 0.9);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1000;
            transition: background 0.3s, transform 0.2s;
        }
        .ar-button:hover {
            background: rgba(76, 195, 217, 1);
            transform: scale(1.05);
        }
        .ar-button.active {
            background: rgba(255, 87, 87, 0.9);
        }
        
        @media (min-width: 768px) {
            .ar-button {
                top: 20px;
                right: 20px;
                font-size: 16px;
                padding: 12px 24px;
            }
        }
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&display=swap');
        
        .header-title {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 24px;
            font-weight: 600;
            font-family: 'Playfair Display', Georgia, serif;
            text-shadow: 2px 2px 6px rgba(0,0,0,0.9);
            z-index: 100;
            text-align: center;
            letter-spacing: 1px;
            padding: 12px 20px;
            background: rgba(0,0,0,0.6);
            border-radius: 12px;
            backdrop-filter: blur(6px);
            max-width: 95%;
            border: 1px solid rgba(255,255,255,0.1);
            line-height: 1.3;
        }
        
        @media (min-width: 768px) {
            .header-title {
                font-size: 32px;
                padding: 15px 25px;
                top: 20px;
            }
        }
        
        @media (min-width: 1200px) {
            .header-title {
                font-size: 42px;
                padding: 20px 30px;
                top: 25px;
                letter-spacing: 2px;
            }
        }
        #arrows {
            position: absolute; top: 0; bottom: 0; left: 0; right: 0;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px; pointer-events: none; z-index: 100;
        }
        .arrow-btn {
            pointer-events: auto;
            padding: 12px 18px; cursor: pointer;
            background: rgba(255, 255, 255, 0.9); border: none; border-radius: 50%;
            font-weight: bold; font-size: 20px; transition: background 0.3s, transform 0.2s;
            width: 45px; height: 45px; display: flex; align-items: center; justify-content: center;
        }
        .arrow-btn:hover { background: #fff; transform: scale(1.1); }
        
        @media (min-width: 768px) {
            #arrows { padding: 0 30px; }
            .arrow-btn {
                padding: 15px 25px;
                width: 60px; height: 60px;
                font-size: 24px;
            }
        }
        
        @media (min-width: 1200px) {
            #arrows { padding: 0 100px; }
        }
        
        #loading {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            color: #fff; font-size: 18px; font-weight: bold; z-index: 200;
            background: rgba(0, 0, 0, 0.8); padding: 15px 25px; border-radius: 12px;
            display: flex; flex-direction: column; align-items: center; gap: 12px;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255, 255, 255, 0.3);
            border-top: 4px solid #4CC3D9; border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        @media (min-width: 768px) {
            #loading {
                font-size: 22px;
                padding: 18px 30px;
            }
            .spinner {
                width: 50px; height: 50px;
                border-width: 5px;
            }
        }
        
        #description {
            position: absolute; bottom: 80px; left: 50%; transform: translateX(-50%);
            color: #fff; font-size: 14px; font-weight: 500; text-align: center;
            background: rgba(0, 0, 0, 0.7); padding: 10px 20px; border-radius: 8px;
            z-index: 100; max-width: 90%;
            line-height: 1.4;
        }
        
        @media (min-width: 768px) {
            #description {
                font-size: 16px;
                padding: 12px 25px;
                bottom: 90px;
                max-width: 80%;
            }
        }
        
        @media (min-width: 1200px) {
            #description {
                font-size: 18px;
                padding: 15px 30px;
                bottom: 100px;
            }
        }
    </style>
</head>
<body>

    <div class="header-title">3D галерея экспонатов выставки «Коренные народы Сибири»</div>
    <div id="loading">
        <div class="spinner"></div>
        <div>Загрузка...</div>
    </div>
    <div id="arrows">
        <button class="arrow-btn" id="prev-btn">←</button>
        <button class="arrow-btn" id="next-btn">→</button>
    </div>
    <div id="description"></div>

    <button id="ar-btn" class="ar-button">AR</button>

    <a-scene 
        renderer="colorManagement: true; antialias: true; physicallyCorrectLights: true; logarithmicDepthBuffer: true;"
        shadow="type: pcfsoft"
        gallery-controls
        ar-hit-test
        vr-mode-ui="enabled: false"
        webxr="optionalFeatures: hit-test, dom-overlay; overlayElement: #dom-overlay;">
        
        <a-entity id="ar-cursor" visible="false" geometry="primitive: ring; radius: 0.05; radiusTubular: 0.01" material="color: #4CC3D9"></a-entity>
        
        <a-sky material="shader: background-gradient; colorTop: #666666; colorBottom: #1a1a1a;" geometry="primitive: sphere; radius: 500; thetaLength: 64; phiLength: 64; thetaSegments: 64; phiSegments: 64;"></a-sky>

        <!-- ОСВЕЩЕНИЕ -->
        <a-entity light="type: ambient; intensity: 1.0;"></a-entity>
        <a-entity id="main-light"
                  position="3 5 4"
                  light="type: directional; intensity: 1.5; castShadow: true; shadowBias: -0.001; shadowMapHeight: 2048; shadowMapWidth: 2048; shadowCameraLeft: -4; shadowCameraRight: 4; shadowCameraTop: 4; shadowCameraBottom: -4;">
        </a-entity>

        <!-- ЦЕНТРАЛЬНАЯ ОСЬ ДЛЯ ВРАЩЕНИЯ -->
        <!-- Именно этот блок мы будем крутить мышкой -->
        <a-entity id="model-wrapper" position="0 0 0">
            <!-- Сама фигурка -->
            <a-entity id="main-model"
                      gltf-model="models/Figure_1.glb" 
                      shadow="cast: true; receive: true">
            </a-entity>
        </a-entity>
        
        <!-- Пол для тени -->
        <a-plane rotation="-90 0 0" position="0 0 0" width="20" height="20" color="#000" opacity="0.2" shadow="receive: true"></a-plane>

        <!-- СТАТИЧНАЯ КАМЕРА (больше никаких конфликтов орбиты) -->
        <a-entity id="main-camera" camera
                  look-controls="enabled: false"
                  wasd-controls="enabled: false"
                  look-at="0 0 0"
                  position="0 0 4">
        </a-entity>

    </a-scene>

    <script>
        // Компонент для AR hit-test
        AFRAME.registerComponent('ar-hit-test', {
            init: function () {
                this.el.sceneEl.addEventListener('enter-vr', () => {
                    if (this.el.sceneEl.is('ar-mode')) {
                        this.setupHitTest();
                    }
                });
                
                this.el.sceneEl.addEventListener('exit-vr', () => {
                    this.cleanupHitTest();
                });
            },
            
            setupHitTest: function () {
                const session = this.el.sceneEl.renderer.xr.getSession();
                if (!session) return;
                
                this.hitTestSource = null;
                this.hitTestRequest = null;
                
                session.requestReferenceSpace('viewer').then((referenceSpace) => {
                    session.requestHitTestSource({ space: referenceSpace }).then((source) => {
                        this.hitTestSource = source;
                    });
                });
                
                this.xrReferenceSpace = session.referenceSpace;
                this.el.sceneEl.renderer.xr.setAnimationLoop(this.onXRFrame.bind(this));
            },
            
            cleanupHitTest: function () {
                if (this.hitTestSource) {
                    this.hitTestSource.cancel();
                    this.hitTestSource = null;
                }
                this.el.sceneEl.renderer.xr.setAnimationLoop(null);
            },
            
            onXRFrame: function (time, frame) {
                const session = frame.session;
                const referenceSpace = this.xrReferenceSpace;
                const basePose = frame.getViewerPose(referenceSpace);
                
                if (!this.hitTestSource || !basePose) return;
                
                const hitTestResults = frame.getHitTestResults(this.hitTestSource);
                
                if (hitTestResults.length > 0) {
                    const hit = hitTestResults[0];
                    const hitPose = hit.getPose(referenceSpace);
                    
                    // Обновляем позицию курсора
                    const position = hitPose.transform.position;
                    const quaternion = hitPose.transform.orientation;
                    
                    arCursor.setAttribute('position', {
                        x: position.x,
                        y: position.y,
                        z: position.z - 0.01
                    });
                    
                    // Обновляем позицию модели
                    wrapperEntity.setAttribute('position', {
                        x: position.x,
                        y: position.y,
                        z: position.z
                    });
                }
            }
        });

        AFRAME.registerComponent('gallery-controls', {
            init: function () {
                this.wrapper = document.getElementById('model-wrapper');
                this.camera = document.getElementById('main-camera');
                
                this.isDragging = false;
                this.previousPos = { x: 0, y: 0 };
                
                // Настройки зума
                this.zoom = 4; // стартовая дистанция камеры
                this.minZoom = 1.5;
                this.maxZoom = 10;
                
                this.initialDistance = 0;
                this.initialZoom = 4;

                this.onPointerDown = this.onPointerDown.bind(this);
                this.onPointerUp = this.onPointerUp.bind(this);
                this.onPointerMove = this.onPointerMove.bind(this);
                this.onWheel = this.onWheel.bind(this);

                document.addEventListener('mousedown', this.onPointerDown);
                document.addEventListener('mouseup', this.onPointerUp);
                document.addEventListener('mousemove', this.onPointerMove);
                
                document.addEventListener('touchstart', this.onPointerDown, {passive: false});
                document.addEventListener('touchend', this.onPointerUp);
                document.addEventListener('touchmove', this.onPointerMove, {passive: false});
                
                document.addEventListener('wheel', this.onWheel, {passive: false});
            },
            onPointerDown: function (evt) {
                if (evt.target.tagName === 'BUTTON') return; // не блокируем клик по меню
                this.isDragging = true;
                
                if (evt.touches && evt.touches.length === 2) {
                    this.initialDistance = Math.hypot(
                        evt.touches[0].clientX - evt.touches[1].clientX,
                        evt.touches[0].clientY - evt.touches[1].clientY
                    );
                    this.initialZoom = this.zoom;
                } else {
                    let clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
                    let clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
                    this.previousPos = { x: clientX, y: clientY };
                }
            },
            onPointerUp: function () {
                this.isDragging = false;
            },
            onPointerMove: function (evt) {
                if (!this.isDragging) return;
                
                // Обработка щипка (ЗУМ на смартфоне)
                if (evt.touches && evt.touches.length === 2) {
                    evt.preventDefault();
                    let currentDistance = Math.hypot(
                        evt.touches[0].clientX - evt.touches[1].clientX,
                        evt.touches[0].clientY - evt.touches[1].clientY
                    );
                    let zoomFactor = this.initialDistance / currentDistance;
                    this.zoom = this.initialZoom * zoomFactor;
                    this.zoom = Math.max(this.minZoom, Math.min(this.zoom, this.maxZoom));
                    this.camera.setAttribute('position', `0 0 ${this.zoom}`);
                    return;
                }

                // Обработка вращения (Один палец / Мышь)
                evt.preventDefault();
                let clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
                let clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
                
                let deltaX = clientX - this.previousPos.x;
                let deltaY = clientY - this.previousPos.y;

                let rot = this.wrapper.getAttribute('rotation');
                // Корректируем deltaY в зависимости от ориентации модели по оси Y
                // чтобы вращение по X всегда было интуитивно понятным
                let rotYRad = rot.y * Math.PI / 180;
                let adjustedDeltaY = deltaY * Math.cos(rotYRad);
                
                // Крутим модель по Y (влево/вправо) и немного по X (вверх/вниз)
                this.wrapper.setAttribute('rotation', {
                    x: Math.max(-180, Math.min(180, rot.x + adjustedDeltaY * 0.2)), // ограничение наклона
                    y: rot.y + deltaX * 0.2,
                    z: rot.z
                });

                this.previousPos = { x: clientX, y: clientY };
            },
            onWheel: function (evt) {
                evt.preventDefault();
                // Зум колесиком мыши (двигаем камеру)
                this.zoom += evt.deltaY * 0.005;
                this.zoom = Math.max(this.minZoom, Math.min(this.zoom, this.maxZoom));
                this.camera.setAttribute('position', `0 0 ${this.zoom}`);
            }
        });

        // 3. АВТО-МАСШТАБИРОВАНИЕ И ЦЕНТРИРОВАНИЕ
        const modelEntity = document.getElementById('main-model');
        const wrapperEntity = document.getElementById('model-wrapper');
        const loadingEl = document.getElementById('loading');
        const descriptionEl = document.getElementById('description');
        const TARGET_SIZE = 2.8;
        
        // Описания фигурок
        const descriptions = {
            1: "Арктический голец - пресноводная рыба семейства лососевых",
            2: "Омуль - сиговая рыба, обитающая в сибирских озерах и реках",
            3: "Нельма - крупный представитель сиговых, ценная промысловая рыба",
            4: "Муксун - сибирская сиговая рыба с нежным мясом",
            5: "Сибирский хариус - красивая форель, обитающая в быстрых реках",
            6: "Ленок - хищная рыба из семейства лососевых",
            7: "Таймень - крупнейшая пресноводная рыба Сибири",
            8: "Щука - хищница, распространенная в водоемах Сибири",
            9: "Окунь - популярная спортивная рыба",
            10: "Сазан - крупный представитель карповых",
            11: "Карась - неприхотливая пресноводная рыба",
            12: "Плотва - распространенная рыба семейства карповых",
            13: "Лещ - крупная рыба с широким телом",
            14: "Язь - ценная промысловая рыба",
            15: "Голавль - крупная рыба семейства карповых",
            16: "Подуст - обитатель быстрых рек",
            17: "Чебак - сибирская рыбка семейства карповых",
            18: "Ерш - небольшая колючая рыба"
        };

        let currentFigure = 1;
        const totalFigures = 18;

        function processModel() {
            const mesh = modelEntity.getObject3D('mesh');
            if (!mesh) return;

            // 1. Сброс трансформаций
            modelEntity.object3D.scale.set(1, 1, 1);
            modelEntity.object3D.position.set(0, 0, 0);
            modelEntity.object3D.updateMatrixWorld(true);

            // 2. Расчет размеров
            const box = new THREE.Box3().setFromObject(mesh);
            const size = new THREE.Vector3(); box.getSize(size);
            const maxDim = Math.max(size.x, size.y, size.z);
            if (maxDim === 0) return;

            // 3. Масштабирование
            const scaleFactor = TARGET_SIZE / maxDim;
            modelEntity.object3D.scale.set(scaleFactor, scaleFactor, scaleFactor);
            modelEntity.object3D.updateMatrixWorld(true);

            // 4. ИДЕАЛЬНОЕ ЦЕНТРИРОВАНИЕ (Вокруг центра масс)
            const scaledBox = new THREE.Box3().setFromObject(mesh);
            const center = new THREE.Vector3(); scaledBox.getCenter(center);

            // ТЕПЕРЬ МЫ ИСПОЛЬЗУЕМ -center.y вместо -scaledBox.min.y
            // Это совместит центр модели с центром вращения Wrapper-а
            modelEntity.object3D.position.set(-center.x, -center.y, -center.z);
            modelEntity.object3D.updateMatrixWorld(true);

            // 5. Опускаем пол под ноги модели (чтобы она не "тонула")
            // Мы берем нижнюю точку модели после центрирования
            const floorY = scaledBox.min.y - center.y;
            document.querySelector('a-plane').setAttribute('position', `0 ${floorY} 0`);

            // 6. Сглаживание и тени (фиксим полосы)
            mesh.traverse(node => {
                if (node.isMesh) {
                    node.castShadow = true;
                    node.receiveShadow = true;
                    node.geometry.computeVertexNormals();
                    if (node.material) {
                        node.material.flatShading = false;
                        node.material.shadowSide = THREE.FrontSide;
                        node.material.needsUpdate = true;
                    }
                }
            });

            // Скрываем индикатор загрузки
            loadingEl.style.display = 'none';
        }

        modelEntity.addEventListener('model-loaded', processModel);
        modelEntity.addEventListener('model-error', () => {
            loadingEl.style.display = 'none';
        });

        // 4. СТРЕЛКИ ДЛЯ НАВИГАЦИИ
        const prevBtn = document.getElementById('prev-btn');
        const nextBtn = document.getElementById('next-btn');

        function loadFigure(num) {
            loadingEl.style.display = 'flex';
            descriptionEl.textContent = descriptions[num] || `Figure ${num}`;
            
            // При загрузке новой модели сбрасываем ее позицию и возвращаем вращение в 0
            modelEntity.object3D.scale.set(1, 1, 1);
            modelEntity.object3D.position.set(0, 0, 0);
            modelEntity.object3D.updateMatrixWorld(true);
            wrapperEntity.setAttribute('rotation', '0 0 0');
            
            modelEntity.removeAttribute('gltf-model');
            setTimeout(() => {
                modelEntity.setAttribute('gltf-model', `models/Figure_${num}.glb`);
            }, 10);
        }

        prevBtn.onclick = () => {
            currentFigure = currentFigure > 1 ? currentFigure - 1 : totalFigures;
            loadFigure(currentFigure);
        };

        nextBtn.onclick = () => {
            currentFigure = currentFigure < totalFigures ? currentFigure + 1 : 1;
            loadFigure(currentFigure);
        };

        // Загружаем первую фигурку
        loadFigure(currentFigure);

        // 5. AR РЕЖИМ
        const arBtn = document.getElementById('ar-btn');
        const scene = document.querySelector('a-scene');
        let isARActive = false;
        const arCursor = document.getElementById('ar-cursor');

        arBtn.onclick = () => {
            if (!isARActive) {
                scene.enterVR();
            } else {
                scene.exitVR();
            }
        };

        scene.addEventListener('enter-vr', () => {
            isARActive = scene.is('ar-mode');
            if (isARActive) {
                arBtn.classList.add('active');
                arBtn.textContent = 'Exit AR';
                
                // Скрываем элементы UI в AR режиме
                document.querySelector('.header-title').style.display = 'none';
                document.getElementById('description').style.display = 'none';
                document.getElementById('arrows').style.display = 'none';
                
                // Скрываем фон и пол в AR режиме
                document.querySelector('a-sky').setAttribute('visible', false);
                document.querySelector('a-plane').setAttribute('visible', false);
                
                // Показываем курсор для hit-test
                arCursor.setAttribute('visible', true);
                
                // Настраиваем модель для AR
                wrapperEntity.setAttribute('position', '0 0 -0.5');
            }
        });

        scene.addEventListener('exit-vr', () => {
            isARActive = false;
            arBtn.classList.remove('active');
            arBtn.textContent = 'AR';
            
            // Показываем элементы UI после выхода из AR
            document.querySelector('.header-title').style.display = 'block';
            document.getElementById('description').style.display = 'block';
            document.getElementById('arrows').style.display = 'flex';
            
            // Восстанавливаем фон и пол
            document.querySelector('a-sky').setAttribute('visible', true);
            document.querySelector('a-plane').setAttribute('visible', true);
            
            // Скрываем курсор hit-test
            arCursor.setAttribute('visible', false);
            
            // Восстанавливаем позицию модели
            wrapperEntity.setAttribute('position', '0 0 0');
        });
</body>
</html>

<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Галерея Фигурок | AR mode</title>

    <link rel="stylesheet" href="styles.css">
    <script src="js/aframe.min.js"></script>
    <script src="background-gradient.js"></script>
</head>
<body>

    <div id="overlay">
        <div class="header-title">3D галерея «Коренные народы Сибири»</div>
        <div id="loading">
            <div class="spinner"></div>
            <div>Загрузка...</div>
        </div>
        <div id="arrows">
            <button class="arrow-btn" id="prev-btn">←</button>
            <button class="arrow-btn" id="next-btn">→</button>
        </div>
        <div id="description"></div>

        <button id="ar-mode-btn" class="custom-ar-button" style="display: none;">AR</button>
        <div id="ar-unsupported-msg" class="ar-unsupported-msg">
            ⚠️ Ваше устройство не поддерживает WebXR AR. Доступен только 3D просмотр.
        </div>
    </div>

    <!-- Убрали багованный ar-hit-test из сцены! -->
    <a-scene
        renderer="colorManagement: true; antialias: true; physicallyCorrectLights: true; logarithmicDepthBuffer: true;"
        shadow="type: pcfsoft"
        webxr="requiredFeatures: hit-test; optionalFeatures: dom-overlay; overlayElement: #overlay; referenceSpaceType: local;"
        ar-placement
        log-webxr
        ar-model-sync
        gallery-controls>

        <a-sky material="shader: background-gradient; colorTop: #1e2a3a; colorBottom: #0a0a0a;" geometry="primitive: sphere; radius: 500; thetaLength: 64; phiLength: 64;" hide-on-enter-ar></a-sky>

        <a-entity light="type: ambient; intensity: 0.9;"></a-entity>
        <a-entity id="main-light"
                  position="3 5 4"
                  light="type: directional; intensity: 1.6; castShadow: true; shadowBias: -0.0005; shadowMapHeight: 2048; shadowMapWidth: 2048; shadowCameraLeft: -4; shadowCameraRight: 4; shadowCameraTop: 4; shadowCameraBottom: -4;">
        </a-entity>
        <a-entity light="type: hemisphere; intensity: 0.5; color: #ffffff; groundColor: #443322;"></a-entity>

        <a-entity id="model-wrapper" position="0 0 0" hide-on-enter-ar>
            <a-entity id="main-model" gltf-model="models/Figure_1.glb" shadow="cast: true; receive: true"></a-entity>
        </a-entity>
        
        <a-plane rotation="-90 0 0" position="0 0 0" width="20" height="20" color="#111" opacity="0.3" shadow="receive: true" hide-on-enter-ar></a-plane>

        <!-- Железобетонный ручной прицел -->
        <a-entity id="reticle" visible="false">
            <a-ring rotation="-90 0 0" radius-inner="0.04" radius-outer="0.06" color="#4CC3D9" material="shader: flat; opacity: 0.8"></a-ring>
        </a-entity>

        <a-entity id="ar-model" visible="false">
            <a-entity id="ar-model-inner" gltf-model="models/Figure_1.glb" shadow="cast: true; receive: true"></a-entity>
        </a-entity>

        <a-entity id="main-camera" camera look-controls="enabled: false" wasd-controls="enabled: false" position="0 0 0.25"></a-entity>

    </a-scene>

    <script>
        const arButton = document.getElementById('ar-mode-btn');
        const unsupportedMsg = document.getElementById('ar-unsupported-msg');
        let isArSupportedFlag = false;

        async function checkARSupport() {
            if ('xr' in navigator && 'isSessionSupported' in navigator.xr) {
                try {
                    const supported = await navigator.xr.isSessionSupported('immersive-ar');
                    isArSupportedFlag = supported;
                    arButton.style.display = supported ? 'flex' : 'none';
                    unsupportedMsg.style.display = supported ? 'none' : 'block';
                } catch (err) {
                    isArSupportedFlag = false;
                    arButton.style.display = 'none';
                    unsupportedMsg.style.display = 'block';
                }
            } else {
                arButton.style.display = 'none';
                unsupportedMsg.style.display = 'block';
            }
        }
        checkARSupport();

        async function enterAR() {
            const sceneEl = document.querySelector('a-scene');
            if (!sceneEl || !isArSupportedFlag) {
                alert('Ваше устройство не поддерживает WebXR AR');
                return;
            }
            try {
                await sceneEl.enterVR({ mode: 'immersive-ar' });
            } catch (err) {
                console.error(err);
            }
        }
        arButton.addEventListener('click', enterAR);
        
        // --- 1. АБСОЛЮТНО НАДЕЖНОЕ РАЗМЕЩЕНИЕ ЧЕРЕЗ NATIVE WEBXR API ---
        AFRAME.registerComponent('ar-placement', {
            init: function () {
                this.reticle = document.getElementById('reticle');
                this.arModel = document.getElementById('ar-model');
                
                this.arMode = false;
                this.placed = false;
                this.hitTestSource = null;
                this.localSpace = null;

                this.isDragging = false;
                this.previousPos = { x: 0, y: 0 };
                this.initialDistance = 0;
                this.initialScale = 1;
                this.initialAngle = 0;
                this.initialRotationY = 0;

                this.onSelect = this.onSelect.bind(this);
                this.onPointerDown = this.onPointerDown.bind(this);
                this.onPointerUp = this.onPointerUp.bind(this);
                this.onPointerMove = this.onPointerMove.bind(this);

                const sceneEl = this.el;

                sceneEl.addEventListener('enter-vr', () => {
                    if (sceneEl.is('ar-mode')) {
                        this.arMode = true;
                        this.placed = false;
                        document.body.classList.add('ar-mode');
                        
                        if (this.reticle) this.reticle.setAttribute('visible', 'false');
                        if (this.arModel) this.arModel.setAttribute('visible', 'false');

                        // Запускаем нативный поиск поверхностей
                        const session = sceneEl.renderer.xr.getSession();
                        if (session) {
                            session.addEventListener('select', this.onSelect);
                            
                            session.requestReferenceSpace('viewer').then((viewerSpace) => {
                                session.requestHitTestSource({ space: viewerSpace }).then((source) => {
                                    this.hitTestSource = source;
                                });
                            });
                            
                            session.requestReferenceSpace('local').then((space) => {
                                this.localSpace = space;
                            });
                        }
                    }
                });

                sceneEl.addEventListener('exit-vr', () => {
                    this.arMode = false;
                    this.placed = false;
                    this.hitTestSource = null;
                    document.body.classList.remove('ar-mode');
                    if (this.reticle) this.reticle.setAttribute('visible', 'false');
                    if (this.arModel) this.arModel.setAttribute('visible', 'false');
                    
                    const session = sceneEl.renderer.xr?.getSession();
                    if (session) session.removeEventListener('select', this.onSelect);
                });

                window.addEventListener('touchstart', this.onPointerDown, { passive: false });
                window.addEventListener('touchend', this.onPointerUp);
                window.addEventListener('touchmove', this.onPointerMove, { passive: false });
            },

            // Native hit-test loop
            tick: function () {
                if (!this.arMode || !this.hitTestSource || this.placed || !this.localSpace) return;

                const frame = this.el.sceneEl.frame;
                if (!frame) return;

                const hitTestResults = frame.getHitTestResults(this.hitTestSource);
                if (hitTestResults.length > 0) {
                    const hit = hitTestResults[0];
                    const pose = hit.getPose(this.localSpace);
                    
                    this.reticle.setAttribute('visible', 'true');
                    this.reticle.setAttribute('position', pose.transform.position);
                    this.reticle.object3D.quaternion.copy(pose.transform.orientation);
                } else {
                    this.reticle.setAttribute('visible', 'false');
                }
            },

            // Native tap
            onSelect: function () {
                if (!this.arMode || this.placed || !this.reticle.getAttribute('visible')) return;
                
                const pos = this.reticle.getAttribute('position');
                const rot = this.reticle.object3D.quaternion;
                
                this.arModel.setAttribute('position', pos);
                this.arModel.object3D.quaternion.copy(rot);
                this.arModel.setAttribute('visible', 'true');
                
                this.placed = true;
                this.reticle.setAttribute('visible', 'false');
                this.hitTestSource = null; // Отключаем сканирование пола
                
                if (window.navigator.vibrate) window.navigator.vibrate(50);
            },

            // Жесты (работают только после размещения)
            onPointerDown: function (evt) {
                if (!this.arMode || !this.placed) return;
                if (evt.touches.length === 2) {
                    const dx = evt.touches[0].clientX - evt.touches[1].clientX;
                    const dy = evt.touches[0].clientY - evt.touches[1].clientY;
                    this.initialDistance = Math.hypot(dx, dy);
                    this.initialScale = this.arModel.object3D.scale.x;
                    this.initialAngle = Math.atan2(dy, dx);
                    const rot = this.arModel.getAttribute('rotation');
                    this.initialRotationY = rot.y;
                } else if (evt.touches.length === 1) {
                    this.isDragging = true;
                    this.previousPos = { x: evt.touches[0].clientX, y: evt.touches[0].clientY };
                }
            },

            onPointerUp: function () {
                this.isDragging = false;
            },

            onPointerMove: function (evt) {
                if (!this.arMode || !this.placed) return;
                if (evt.touches.length === 2) {
                    evt.preventDefault();
                    const dx = evt.touches[0].clientX - evt.touches[1].clientX;
                    const dy = evt.touches[0].clientY - evt.touches[1].clientY;
                    const currentDistance = Math.hypot(dx, dy);
                    const currentAngle = Math.atan2(dy, dx);

                    let scale = this.initialScale * (currentDistance / this.initialDistance);
                    scale = Math.max(0.1, Math.min(5.0, scale));
                    this.arModel.object3D.scale.set(scale, scale, scale);

                    let deltaAngle = currentAngle - this.initialAngle;
                    this.arModel.setAttribute('rotation', { x: 0, y: this.initialRotationY + deltaAngle * (180 / Math.PI), z: 0 });
                }
                else if (this.isDragging && evt.touches.length === 1) {
                    evt.preventDefault();
                    const clientX = evt.touches[0].clientX;
                    const clientY = evt.touches[0].clientY;
                    const deltaX = clientX - this.previousPos.x;
                    const deltaY = clientY - this.previousPos.y;

                    let pos = this.arModel.getAttribute('position');
                    pos.x += deltaX * 0.002;
                    pos.z += deltaY * 0.002;
                    this.arModel.setAttribute('position', pos);
                    this.previousPos = { x: clientX, y: clientY };
                }
            }
        });

        AFRAME.registerComponent('log-webxr', {
            init: function () {
                this.el.addEventListener('enter-vr', (evt) => { console.log('Режим:', evt.detail.session.mode); });
                this.el.addEventListener('exit-vr', () => { console.log('Выход из VR/AR'); });
            }
        });

        AFRAME.registerComponent('ar-model-sync', {
            init: function () {
                this.arModelInner = document.getElementById('ar-model-inner');
                this.arModelParent = document.getElementById('ar-model');
                this.currentFigure = 1;
                this.el.addEventListener('figure-changed', (evt) => {
                    this.currentFigure = evt.detail.figure;
                    this.updateModel();
                });
                this.updateModel();
            },
            updateModel: function () {
                if (!this.arModelInner) return;
                this.arModelInner.removeAttribute('gltf-model');
                setTimeout(() => {
                    this.arModelInner.setAttribute('gltf-model', `models/Figure_${this.currentFigure}.glb`);
                    this.arModelInner.addEventListener('model-loaded', () => { this.scaleArModelToFit(); }, { once: true });
                }, 30);
            },
            scaleArModelToFit: function () {
                const object = this.arModelInner.object3D;
                if (!object || object.children.length === 0) {
                    setTimeout(() => this.scaleArModelToFit(), 100);
                    return;
                }
                object.scale.set(1, 1, 1);
                object.updateMatrixWorld(true);
                const box = new THREE.Box3().setFromObject(object);
                const size = new THREE.Vector3();
                box.getSize(size);
                const maxDim = Math.max(size.x, size.y, size.z);
                if (maxDim === 0 || isNaN(maxDim)) return;
                
                const TARGET_AR_SIZE = 0.20; // 20 см - чтобы фигурку было чётко видно
                const scaleFactor = TARGET_AR_SIZE / maxDim;
                object.scale.set(scaleFactor, scaleFactor, scaleFactor);
                object.updateMatrixWorld(true);
                
                const centeredBox = new THREE.Box3().setFromObject(object);
                const center = new THREE.Vector3();
                centeredBox.getCenter(center);
                object.position.set(-center.x, -centeredBox.min.y, -center.z);
                object.updateMatrixWorld(true);
                
                if (this.arModelParent) this.arModelParent.object3D.scale.set(1, 1, 1);
            }
        });

        // 3D галерея (Без изменений - вращение и зум)
        AFRAME.registerComponent('gallery-controls', {
            init: function () {
                this.wrapper = document.getElementById('model-wrapper');
                this.camera = document.getElementById('main-camera');
                this.isDragging = false;
                this.previousPos = { x: 0, y: 0 };
                this.zoom = 0.175;
                this.minZoom = 0.10;
                this.maxZoom = 0.175;
                this.initialDistance = 0;
                this.initialZoom = 0.175;

                this.onPointerDown = this.onPointerDown.bind(this);
                this.onPointerUp = this.onPointerUp.bind(this);
                this.onPointerMove = this.onPointerMove.bind(this);
                this.onWheel = this.onWheel.bind(this);

                document.addEventListener('mousedown', this.onPointerDown);
                document.addEventListener('mouseup', this.onPointerUp);
                document.addEventListener('mousemove', this.onPointerMove);
                document.addEventListener('touchstart', this.onPointerDown, { passive: false });
                document.addEventListener('touchend', this.onPointerUp);
                document.addEventListener('touchmove', this.onPointerMove, { passive: false });
                document.addEventListener('wheel', this.onWheel, { passive: false });

                this.camera.setAttribute('position', `0 0 ${this.zoom}`);
            },
            onPointerDown: function (evt) {
                if (document.body.classList.contains('ar-mode')) return;
                if (evt.target.closest && (evt.target.closest('#prev-btn') || evt.target.closest('#next-btn') || evt.target.closest('#ar-mode-btn'))) return;
                this.isDragging = true;
                if (evt.touches && evt.touches.length === 2) {
                    this.initialDistance = Math.hypot(evt.touches[0].clientX - evt.touches[1].clientX, evt.touches[0].clientY - evt.touches[1].clientY);
                    this.initialZoom = this.zoom;
                } else {
                    this.previousPos = { x: evt.touches ? evt.touches[0].clientX : evt.clientX, y: evt.touches ? evt.touches[0].clientY : evt.clientY };
                }
            },
            onPointerUp: function () { this.isDragging = false; },
            onPointerMove: function (evt) {
                if (document.body.classList.contains('ar-mode') || !this.isDragging) return;
                if (evt.touches && evt.touches.length === 2) {
                    evt.preventDefault();
                    let currentDistance = Math.hypot(evt.touches[0].clientX - evt.touches[1].clientX, evt.touches[0].clientY - evt.touches[1].clientY);
                    this.zoom = Math.max(this.minZoom, Math.min(this.initialZoom * (this.initialDistance / currentDistance), this.maxZoom));
                    this.camera.setAttribute('position', `0 0 ${this.zoom}`);
                    return;
                }
                evt.preventDefault();
                let clientX = evt.touches ? evt.touches[0].clientX : evt.clientX;
                let clientY = evt.touches ? evt.touches[0].clientY : evt.clientY;
                let rot = this.wrapper.getAttribute('rotation');
                let newRotX = Math.max(-70, Math.min(70, rot.x + (clientY - this.previousPos.y) * Math.cos(rot.y * Math.PI / 180) * 0.22));
                this.wrapper.setAttribute('rotation', { x: newRotX, y: rot.y + (clientX - this.previousPos.x) * 0.22, z: rot.z });
                this.previousPos = { x: clientX, y: clientY };
            },
            onWheel: function (evt) {
                if (document.body.classList.contains('ar-mode')) return;
                evt.preventDefault();
                this.zoom = Math.max(this.minZoom, Math.min(this.zoom + evt.deltaY * 0.001, this.maxZoom));
                this.camera.setAttribute('position', `0 0 ${this.zoom}`);
            }
        });

        const modelEntity = document.getElementById('main-model');
        const wrapperEntity = document.getElementById('model-wrapper');
        const loadingEl = document.getElementById('loading');
        const descriptionEl = document.getElementById('description');
        const TARGET_SIZE = 0.15;

        const descriptions = {
            1: "Тофаларские охотники", 2: "Тофаларский мальчик с собакой", 3: "Тофаларская девушка", 4: "Тофаларская женщина",
            5: "Тофаларские женщины с младенцем в берестяной колыбели", 6: "Эвенкийские женщины, вышивающие рукавицы",
            7: "Эвенкийская вышивальщица", 8: "Эвенкийки, вышивающие шапки", 9: "Молодая эвенкийская пара", 10: "Эвенкийская семья",
            11: "Эвенкийская женщина с ребенком", 12: "Ненецкая женщина с ребенком", 13: "Ненец - охотник", 14: "Ненецкая девушка",
            15: "Ненецкая женщина в оленьей парке", 16: "Ненецкая женщина", 17: "Группа бурят в традиционной одежде", 18: "Бурятские мужчины"
        };

        let currentFigure = 1;
        const totalFigures = 18;

        function processMainModel() {
            const mesh = modelEntity.getObject3D('mesh');
            if (!mesh) return setTimeout(processMainModel, 50);
            
            modelEntity.object3D.scale.set(1, 1, 1);
            modelEntity.object3D.position.set(0, 0, 0);
            modelEntity.object3D.updateMatrixWorld(true);
            const box = new THREE.Box3().setFromObject(mesh);
            const size = new THREE.Vector3(); box.getSize(size);
            if (Math.max(size.x, size.y, size.z) === 0) return;
            const scaleFactor = TARGET_SIZE / Math.max(size.x, size.y, size.z);
            modelEntity.object3D.scale.set(scaleFactor, scaleFactor, scaleFactor);
            modelEntity.object3D.updateMatrixWorld(true);
            const scaledBox = new THREE.Box3().setFromObject(mesh);
            const center = new THREE.Vector3(); scaledBox.getCenter(center);
            modelEntity.object3D.position.set(-center.x, -center.y, -center.z);
            modelEntity.object3D.updateMatrixWorld(true);
            
            const planeEl = document.querySelector('a-plane');
            if (planeEl) planeEl.setAttribute('position', `0 ${new THREE.Box3().setFromObject(mesh).min.y - 0.05} 0`);
            
            mesh.traverse(node => {
                if (node.isMesh) {
                    node.castShadow = true; node.receiveShadow = true;
                    if (node.geometry) node.geometry.computeVertexNormals();
                    if (node.material) { node.material.flatShading = false; node.material.shadowSide = THREE.FrontSide; node.material.needsUpdate = true; }
                }
            });
            loadingEl.style.display = 'none';
        }

        modelEntity.addEventListener('model-loaded', processMainModel);

        function loadFigure(num) {
            loadingEl.style.display = 'flex';
            descriptionEl.textContent = descriptions[num] || `Экспонат №${num}`;
            if (wrapperEntity) wrapperEntity.setAttribute('rotation', '0 0 0');
            modelEntity.removeAttribute('gltf-model');
            setTimeout(() => {
                modelEntity.setAttribute('gltf-model', `models/Figure_${num}.glb`);
                document.querySelector('a-scene').dispatchEvent(new CustomEvent('figure-changed', { detail: { figure: num } }));
            }, 20);
        }

        document.getElementById('prev-btn').onclick = () => { currentFigure = currentFigure > 1 ? currentFigure - 1 : totalFigures; loadFigure(currentFigure); };
        document.getElementById('next-btn').onclick = () => { currentFigure = currentFigure < totalFigures ? currentFigure + 1 : 1; loadFigure(currentFigure); };
        loadFigure(currentFigure);

        document.body.addEventListener('contextmenu', (e) => e.preventDefault());

        // Защита от перехвата тапа интерфейсом, но с пропуском тапа по экрану в AR
        const overlay = document.getElementById('overlay');
        if (overlay) {
            overlay.addEventListener('beforexrselect', (e) => {
                if (e.target.tagName === 'BUTTON') { e.preventDefault(); }
            });
        }
    </script>
</body>
</html>
